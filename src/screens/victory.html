<section id="victory-screen" class="screen hidden" aria-labelledby="victory-title">
      <div class="panel victory-panel">
        <p class="kicker" data-i18n="missionCompleteKicker">Final extraction complete</p>
        <h2 id="victory-title"><span data-i18n="missionTitle">Mission</span> <em data-i18n="completeAccent">complete</em></h2>
        <p id="victory-intro" class="intro"></p>
        <div class="victory-results">
          <div><span data-i18n="difficultyLabel">Difficulty</span><strong id="victory-mode">EASY</strong></div>
          <div><span data-i18n="finalScoreLabel">Score</span><strong id="victory-score">0</strong></div>
          <div><span data-i18n="campaignBestLabel">Campaign best</span><strong id="victory-best">0</strong></div>
          <div><span data-i18n="finalPhaseLabel">Phase reached</span><strong id="victory-phase">25</strong></div>
          <div><span data-i18n="clearTimeLabel">Clear time</span><strong id="victory-time">00:00</strong></div>
          <div><span data-i18n="fastestClearLabel">Fastest clear</span><strong id="victory-fastest">00:00</strong></div>
          <div><span data-i18n="finalLongestStreakLabel">Longest streak</span><strong id="victory-streak">×0</strong></div>
          <div><span data-i18n="totalVictoriesLabel">Victories</span><strong id="victory-wins">1</strong></div>
        </div>
        <div class="victory-actions"><button id="replay-campaign-button" class="primary-button" type="button" data-i18n="replayCampaign">Replay campaign</button><button id="start-endless-button" class="secondary-button" type="button" data-i18n="startEndless">Start Endless</button></div>
        <button id="switch-difficulty-button" class="text-button" type="button" data-i18n="switchDifficulty">Switch difficulty</button>
        <p class="note" data-i18n="victoryReplayNote">Space or Enter replays the campaign</p>
      </div>
    </section>
