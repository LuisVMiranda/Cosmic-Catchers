<section id="reset-screen" class="screen hidden reset-screen" role="dialog" aria-modal="true" aria-labelledby="reset-title">
      <div class="panel compact reset-panel">
        <div id="reset-step-one">
          <p class="kicker" data-i18n="resetKicker">Stats control</p>
          <h2 id="reset-title"><span data-i18n="resetTitle">Reset</span> <em data-i18n="resetTitleAccent">stats?</em></h2>
          <p class="intro" data-i18n="resetText">Reset all game stats and start over?</p>
          <div class="reset-actions"><button id="reset-cancel-button" class="secondary-button" type="button" data-i18n="resetCancel">Keep stats</button><button id="reset-continue-button" class="primary-button" type="button" data-i18n="resetContinue">Continue</button></div>
        </div>
        <div id="reset-step-two" class="hidden">
          <p class="kicker" data-i18n="resetConfirmKicker">Final check</p>
          <h2 id="reset-confirm-title"><span data-i18n="resetConfirmTitle">Really</span> <em data-i18n="resetConfirmTitleAccent">start over?</em></h2>
          <p class="intro" data-i18n="resetConfirmText">Is this really what you want? All scores, victories, clear times, and unlocked Endless modes will be cleared.</p>
          <div class="reset-actions"><button id="reset-back-button" class="secondary-button" type="button" data-i18n="resetBack">Go back</button><button id="reset-confirm-button" class="primary-button" type="button" data-i18n="resetConfirm">Reset stats</button></div>
        </div>
      </div>
    </section>
