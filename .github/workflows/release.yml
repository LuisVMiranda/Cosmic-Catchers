name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run package:windows
      - run: npm run verify:desktop
      # package:windows rebuilds dist/, so recreate the direct-file ZIP last.
      - run: npm run package:release
      - name: Publish direct-file ZIP and Windows executable
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          $executable = "release/Cosmic-Catchers-$version-Windows-Portable.exe"
          gh release create "${{ github.ref_name }}" `
            "dist/Cosmic-Catchers-direct-file.zip" `
            $executable `
            "$executable.sha256" `
            --generate-notes `
            --verify-tag
